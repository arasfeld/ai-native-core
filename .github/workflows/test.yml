name: Tests

on:
  push:
    branches: [main, better-stack]
  pull_request:

jobs:
  python-unit-tests:
    name: Python unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest --cov=services --cov=packages --cov-report=term-missing -q

  typescript-type-check:
    name: TypeScript type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm check-types

      - name: Lint
        run: pnpm lint
