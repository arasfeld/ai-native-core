name: Evals

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      pass_threshold:
        description: Minimum overall score to pass (0.0–1.0)
        default: "0.80"
      judge_model:
        description: Model to use for the LLM-as-judge scorer
        default: "gpt-4o-mini"

jobs:
  golden-evals:
    name: Golden-answer eval suite
    runs-on: ubuntu-latest

    # Only run when the necessary secrets are available
    if: vars.RUN_EVALS == 'true'

    env:
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_PROJECT: ai-native-core-evals
      RUN_EVALS: "1"
      PASS_THRESHOLD: ${{ github.event.inputs.pass_threshold || '0.80' }}
      EVAL_JUDGE_MODEL: ${{ github.event.inputs.judge_model || 'gpt-4o-mini' }}
      EVAL_JUDGE_PROVIDER: openai
      # When set, test_golden.py writes one row per (category, scorer) into
      # the `eval_runs` table so the /admin/evals dashboard can chart history.
      EVAL_DB_URL: ${{ secrets.EVAL_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run golden-answer eval tests
        run: |
          uv run pytest services/agents/tests/evals/test_golden.py \
            -v --tb=short \
            --no-header

      - name: Push results to LangSmith
        if: env.LANGCHAIN_API_KEY != ''
        run: uv run python -m services.agents.tests.evals.langsmith_runner
