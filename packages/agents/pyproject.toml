[project]
name = "agents"
version = "0.1.0"
description = "LangGraph agent workflows"
requires-python = ">=3.11"
dependencies = [
    "ai",
    "prompts",
    "langgraph>=0.2",
    "langchain-core>=0.3",
    "pydantic>=2.0",
    "structlog>=24.0",
]

[tool.uv.sources]
ai = { workspace = true }
prompts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents"]
