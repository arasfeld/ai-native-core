[project]
name = "prompts"
version = "0.1.0"
description = "Shared prompt library — Jinja2 templates and system prompts"
requires-python = ">=3.11"
dependencies = [
    "jinja2>=3.1",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prompts"]

[tool.hatch.build.targets.wheel.sources]
"src/prompts" = "prompts"
